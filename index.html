<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpeakUp">
<meta name="theme-color" content="#0c0e14">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>SpeakUp Coach</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#0c0e14;color:#e8ecf4;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#252a3a;border-radius:2px}
@keyframes ring{0%{transform:scale(.8);opacity:.5}100%{transform:scale(1.8);opacity:0}}
.card{background:#161923;border-radius:14px;border:1px solid #252a3a;padding:16px}
.lbl{display:block;color:#8b95ab;font-size:11px;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
input[type="text"],input[type="password"]{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #252a3a;background:#0c0e14;color:#e8ecf4;font-size:16px;outline:none;font-family:'DM Sans',sans-serif;-webkit-appearance:none}
button{font-family:'DM Sans',sans-serif;cursor:pointer;-webkit-appearance:none;touch-action:manipulation}
.view{display:none;height:100%}
.view.active{display:flex;flex-direction:column}
.ring{position:absolute;border-radius:50%;border:2px solid currentColor}
.r1{animation:ring 2s ease-out 0s infinite}
.r2{animation:ring 2s ease-out .5s infinite}
.r3{animation:ring 2s ease-out 1s infinite}
.scn:active{background:#1e2231!important}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px}
</style>
</head>
<body>
<div id="v-setup" class="view active" style="align-items:center;justify-content:center;padding:24px;overflow-y:auto">
<div style="max-width:400px;width:100%;text-align:center">
<div style="font-size:56px;margin-bottom:8px">🎙️</div>
<h1 style="font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;margin-bottom:4px">SpeakUp Coach</h1>
<p style="color:#8b95ab;margin-bottom:28px;font-size:14px;line-height:1.5">AI English speaking coach</p>
<div class="card" style="text-align:left">
<label class="lbl">API Key</label>
<input type="password" id="inp-key" placeholder="sk-ant-..." style="margin-bottom:4px">
<div style="font-size:11px;color:#556178;margin-bottom:18px">From <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:#60a5fa;text-decoration:none">console.anthropic.com</a></div>
<label class="lbl">Student name</label>
<input type="text" id="inp-name" placeholder="Enter name..." style="margin-bottom:18px">
<label class="lbl">Level</label>
<div id="level-btns" style="display:flex;gap:8px;margin-bottom:20px"></div>
<button onclick="doSetup()" style="width:100%;padding:15px;border-radius:14px;border:none;font-weight:700;font-size:16px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;min-height:52px">Start Coaching</button>
</div></div></div>

<div id="v-home" class="view">
<div class="scroll" style="padding:20px 16px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
<div><h1 id="home-greet" style="font-family:'Outfit';font-size:24px;font-weight:800"></h1><p style="color:#8b95ab;font-size:13px;margin-top:2px">Let's practice speaking</p></div>
<span id="home-level" style="padding:6px 14px;border-radius:14px;font-size:14px;font-weight:700"></span>
</div>
<div id="home-stats" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px"></div>
<div style="display:flex;gap:8px;margin-bottom:16px">
<button onclick="beginSession('free')" style="flex:1;padding:14px;border-radius:12px;border:none;font-weight:600;font-size:14px;background:#f59e0b15;color:#f59e0b">🗣️ Free Talk</button>
<button onclick="beginSession('evaluation')" style="flex:1;padding:14px;border-radius:12px;border:none;font-weight:600;font-size:14px;background:#a78bfa15;color:#a78bfa">📊 Evaluate</button>
</div>
<div id="home-scenarios"></div>
<div id="home-mistakes"></div>
<div style="display:flex;gap:8px;margin-top:12px">
<button onclick="changeKey()" style="flex:1;padding:11px;border-radius:10px;border:1px solid #252a3a;background:transparent;color:#556178;font-size:12px">🔑 API Key</button>
<button onclick="resetProfile()" style="flex:1;padding:11px;border-radius:10px;border:1px solid #252a3a;background:transparent;color:#556178;font-size:12px">⚙️ Reset</button>
</div></div></div>

<div id="v-practice" class="view">
<div style="padding:10px 16px;border-bottom:1px solid #252a3a;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;min-height:44px">
<div id="prac-title" style="font-size:14px;font-weight:600"></div>
<div style="display:flex;gap:8px;align-items:center">
<span id="prac-score" style="font-size:12px;color:#8b95ab"></span>
<button onclick="endSession()" style="padding:6px 14px;border-radius:8px;border:1px solid #f8717130;background:#f8717108;color:#f87171;font-size:12px;font-weight:600;min-height:32px">End</button>
</div></div>
<div id="chat-log" class="scroll" style="display:flex;flex-direction:column;gap:10px"></div>
<div style="padding:14px 16px calc(14px + env(safe-area-inset-bottom));border-top:1px solid #252a3a;background:#161923;flex-shrink:0;text-align:center">
<div id="debug-msg" style="font-size:12px;color:#f87171;margin-bottom:8px;display:none;padding:6px 12px;border-radius:8px;background:#f8717110"></div>
<div id="phase-text" style="font-size:14px;margin-bottom:12px;font-weight:500;color:#34d399">🎙️ Your turn</div>
<div style="position:relative;display:inline-flex;align-items:center;justify-content:center;width:130px;height:130px">
<div id="rings" style="display:none">
<div class="ring r1" style="position:absolute;width:120px;height:120px;top:5px;left:5px"></div>
<div class="ring r2" style="position:absolute;width:120px;height:120px;top:5px;left:5px"></div>
<div class="ring r3" style="position:absolute;width:120px;height:120px;top:5px;left:5px"></div>
</div>
<button id="mic-btn" onclick="micTap()" style="width:100px;height:100px;border-radius:50%;border:none;position:relative;z-index:2;color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 0 30px #22c55e40">▶ Start</button>
</div>
<div id="phase-hint" style="font-size:12px;color:#556178;margin-top:10px">Tap START to speak</div>
</div></div>

<script>
let profile=null,sessions=[],allErrors=[],evals=[],apiKey="";
let currentMode=null,currentScenario=null,aiHistory=[],stats={score:0,n:0,fixes:0};
let phase="idle",recognition=null,lastTranscript="",audioUnlocked=false;
const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
const LEVELS={B1:{label:"Intermediate",color:"#f59e0b",ev:5},B2:{label:"Upper Intermediate",color:"#3b82f6",ev:7},C1:{label:"Advanced",color:"#8b5cf6",ev:10}};
const SC={daily:[{id:"cafe",title:"Ordering at a Cafe",prompt:"You're a barista. The student orders a drink. Chat.",icon:"☕"},{id:"neighbor",title:"New Neighbor",prompt:"You just moved next door. Introduce yourself to the student.",icon:"🏠"},{id:"directions",title:"Giving Directions",prompt:"The student asks directions to the train station.",icon:"🗺️"},{id:"restaurant",title:"Restaurant Issue",prompt:"You're a manager. Handle the student's complaint.",icon:"🍽️"},{id:"doctor",title:"Doctor Visit",prompt:"You're a doctor. Student describes symptoms.",icon:"🏥"},{id:"phone",title:"Customer Service",prompt:"Help the student fix their internet.",icon:"📞"}],professional:[{id:"interview",title:"Job Interview",prompt:"You're interviewing the student. Ask about them.",icon:"💼"},{id:"meeting",title:"Team Meeting",prompt:"You're in a meeting led by the student.",icon:"📊"},{id:"negotiate",title:"Negotiation",prompt:"You're HR. Student negotiates salary.",icon:"🤝"},{id:"feedback",title:"Giving Feedback",prompt:"You receive feedback from the student.",icon:"📝"},{id:"pitch",title:"Client Pitch",prompt:"Student pitches their product. Ask tough questions.",icon:"🎯"},{id:"networking",title:"Networking",prompt:"Professional networking conversation.",icon:"🌐"}]};
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function load(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}

window.onload=function(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    recognition=new SR();
    recognition.continuous=!isIOS;
    recognition.interimResults=true;
    recognition.lang="en-US";
    recognition.onresult=(e)=>{let t="";for(let i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;lastTranscript=t;showLive(t);};
    recognition.onerror=(e)=>{if(e.error!=="aborted")showDbg("Mic: "+e.error);setPhase("idle");};
    recognition.onend=()=>{
      if(phase==="sending"){const t=lastTranscript.trim();setPhase("idle");if(t)sendMsg(t);}
      else if(phase==="listening"&&isIOS){if(lastTranscript.trim()){try{recognition.start();}catch{}}else setPhase("idle");}
      else setPhase("idle");
    };
  }
  if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();}
  profile=load("sc-p");sessions=load("sc-s")||[];allErrors=load("sc-e")||[];evals=load("sc-v")||[];apiKey=load("sc-k")||"";
  if(apiKey)document.getElementById("inp-key").value=apiKey;
  const lb=document.getElementById("level-btns");
  Object.entries(LEVELS).forEach(([k,v])=>{const b=document.createElement("button");b.id="lv-"+k;b.innerHTML=`<div style="font-weight:700;font-size:16px">${k}</div><div style="font-size:10px;color:#8b95ab;margin-top:2px">${v.label}</div>`;b.style.cssText="flex:1;padding:12px 6px;border-radius:12px;cursor:pointer;border:2px solid #252a3a;background:transparent;font-family:'DM Sans',sans-serif;min-height:52px";b.onclick=()=>selLvl(k);lb.appendChild(b);});
  selLvl("B1");
  if(profile)showV("home");else showV("setup");
};
let selLv="B1";
function selLvl(k){selLv=k;Object.keys(LEVELS).forEach(l=>{const b=document.getElementById("lv-"+l);if(l===k){b.style.borderColor=LEVELS[l].color;b.style.background=LEVELS[l].color+"15";b.querySelector("div").style.color=LEVELS[l].color;}else{b.style.borderColor="#252a3a";b.style.background="transparent";b.querySelector("div").style.color="#e8ecf4";}});}
function showV(id){document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));document.getElementById("v-"+id).classList.add("active");if(id==="home")renderHome();}
function doSetup(){unlockAudio();const n=document.getElementById("inp-name").value.trim(),k=document.getElementById("inp-key").value.trim();if(!k){document.getElementById("inp-key").style.borderColor="#f87171";return;}if(!n){document.getElementById("inp-name").style.borderColor="#f87171";return;}apiKey=k;save("sc-k",apiKey);profile={name:n,level:selLv,ts:0,created:new Date().toISOString()};save("sc-p",profile);showV("home");}
function resetProfile(){if(confirm("Reset all data?")){localStorage.clear();location.reload();}}
function changeKey(){const k=prompt("Anthropic API key:",apiKey||"");if(k&&k.trim()){apiKey=k.trim();save("sc-k",apiKey);alert("Updated!");}}

function renderHome(){
  if(!profile)return;
  document.getElementById("home-greet").textContent="Hey, "+profile.name+" 👋";
  const lv=LEVELS[profile.level],ls=document.getElementById("home-level");
  ls.textContent=profile.level;ls.style.color=lv.color;ls.style.background=lv.color+"15";ls.style.border="1px solid "+lv.color+"30";
  const sl=sessions.filter(s=>s.level===profile.level).length,toE=lv.ev-(sl%lv.ev);
  const rc=sessions.slice(-5),avg=rc.length>0?(rc.reduce((a,s)=>a+parseFloat(s.avg||0),0)/rc.length).toFixed(1):"-";
  document.getElementById("home-stats").innerHTML=[["📖",profile.ts||0,"Sessions"],["⭐",avg,"Avg"],["📊",toE,"To Eval"]].map(([i,v,l])=>`<div class="card" style="padding:12px;text-align:center"><div style="font-size:18px">${i}</div><div style="font-size:18px;font-weight:700;margin-top:2px">${v}</div><div style="font-size:10px;color:#8b95ab">${l}</div></div>`).join("");
  let h="";["daily","professional"].forEach(cat=>{h+=`<h3 style="color:#e8ecf4;font-size:14px;font-weight:700;margin:0 0 8px">${cat==="daily"?"🌤️ Daily":"💼 Professional"}</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">`;SC[cat].forEach((s,i)=>{h+=`<button class="card scn" onclick="beginSession('${cat}',${i})" style="padding:14px 12px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;min-height:52px"><span style="font-size:22px">${s.icon}</span><span style="font-size:13px;font-weight:600">${s.title}</span></button>`;});h+=`</div>`;});
  document.getElementById("home-scenarios").innerHTML=h;
  const te=allErrors.reduce((a,e)=>{const k=e.why||e.right;a[k]=(a[k]||0)+1;return a;},{}),se=Object.entries(te).sort((a,b)=>b[1]-a[1]).slice(0,4);
  document.getElementById("home-mistakes").innerHTML=se.length>0?`<div class="card" style="margin-bottom:12px"><h3 style="margin:0 0 8px;font-size:13px;font-weight:700">🔄 Common Mistakes</h3>${se.map(([e,c])=>`<div style="font-size:12px;color:#8b95ab;padding:5px 0;display:flex;justify-content:space-between"><span>${e}</span><span style="color:#f87171;font-weight:700">x${c}</span></div>`).join("")}</div>`:"";
}

function buildSys(){
  const l={B1:"B1 Intermediate. Clear English. Correct basic grammar. 1-2 short sentences.",B2:"B2. Natural English. Correct subtle grammar, push vocabulary. 1-2 sentences.",C1:"C1 Advanced. Sophisticated with idioms. Focus nuance. 1-2 sentences."}[profile.level];
  const ep=currentMode==="evaluation"?'\nEVALUATION. After 6 exchanges add "eval_done":true,"eval":{"grammar":N,"vocabulary":N,"fluency":N,"coherence":N,"pragmatic":N,"level":"B1|B2|C1","summary":"...","strengths":["..."],"improve":["..."]}':"";
  return`You are Coach Alex, friendly English coach for ${profile.name}.\n${l}\n${currentScenario?"ROLE-PLAY: "+currentScenario.prompt:"Natural conversation."}\n${ep}\nRULES: reply is spoken via TTS, keep SHORT 1-2 sentences, no markdown. Check errors.\nRespond ONLY valid JSON:\n{"reply":"short response","fixes":[{"wrong":"x","right":"y","why":"z"}],"tip":"better way or null","score":7}\nNo code blocks.`;
}

async function callAI(sys,msgs,isStart){
  setPhase("thinking");hideDbg();
  try{
    const ctrl=new AbortController(),t=setTimeout(()=>ctrl.abort(),25000);
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",signal:ctrl.signal,headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:sys,messages:msgs})});
    clearTimeout(t);
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error("API "+res.status+": "+(e.error?.message||res.statusText));}
    const data=await res.json(),raw=(data.content||[]).map(c=>c.text||"").join("");
    if(!raw)throw new Error("Empty response");
    let p;try{p=JSON.parse(raw);}catch{const m=raw.match(/\{[\s\S]*\}/);if(m)try{p=JSON.parse(m[0]);}catch{p=null;}}
    if(!p||!p.reply)p={reply:raw.slice(0,200),fixes:[],tip:null,score:5};
    if(p.eval_done&&p.eval){addEval(p.eval);const r={...p.eval,date:new Date().toISOString()};evals.push(r);save("sc-v",evals);if(p.eval.level!==profile.level&&LEVELS[p.eval.level]){profile.level=p.eval.level;save("sc-p",profile);}setPhase("speaking");await say(p.eval.summary);setPhase("idle");return;}
    aiHistory=[...msgs,{role:"assistant",content:JSON.stringify(p)}];
    addCoach(p);
    if(!isStart&&p.fixes?.length>0){p.fixes.forEach(f=>allErrors.push({...f,ts:Date.now()}));allErrors=allErrors.slice(-200);save("sc-e",allErrors);}
    if(!isStart){stats.score+=(p.score||5);stats.n++;stats.fixes+=(p.fixes?.length||0);document.getElementById("prac-score").textContent=(stats.score/stats.n).toFixed(1)+"/10";}
    setPhase("speaking");await say(p.reply);setPhase("idle");
  }catch(err){showDbg(err.name==="AbortError"?"Timed out":"Error: "+err.message);addCoach({reply:"Connection error. Tap Start to retry.",fixes:[]});setPhase("idle");}
}

function beginSession(m,idx){unlockAudio();currentMode=m;currentScenario=(m==="daily"||m==="professional")?SC[m][idx]:null;aiHistory=[];stats={score:0,n:0,fixes:0};document.getElementById("chat-log").innerHTML="";document.getElementById("prac-score").textContent="";hideDbg();document.getElementById("prac-title").textContent=currentScenario?currentScenario.title:(m==="evaluation"?"📊 Evaluation":"🗣️ Free Talk");showV("practice");callAI(buildSys(),[{role:"user",content:m==="evaluation"?"Begin evaluation. Greet briefly, ask first question.":currentScenario?"Begin role-play. Short scene, your opening line.":"Start conversation with "+profile.name+"."}],true);}
function sendMsg(text){addUser(text);lastTranscript="";rmLive();callAI(buildSys(),[...aiHistory,{role:"user",content:text}],false);}
function endSession(){speechSynthesis?.cancel();try{recognition?.stop();}catch{}setPhase("idle");const s={id:Date.now(),date:new Date().toISOString(),mode:currentMode,scenario:currentScenario?.title||"Free",level:profile.level,avg:stats.n>0?(stats.score/stats.n).toFixed(1):0,msgs:stats.n,fixes:stats.fixes};sessions.push(s);sessions=sessions.slice(-100);save("sc-s",sessions);profile.ts=(profile.ts||0)+1;save("sc-p",profile);showV("home");}

function unlockAudio(){
  if(audioUnlocked||!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(" ");
  u.volume=0.01;u.rate=2;
  speechSynthesis.speak(u);
  audioUnlocked=true;
}

function say(text){
  return new Promise(r=>{
    if(!window.speechSynthesis){r();return;}
    speechSynthesis.cancel();
    // iOS fix: small delay after cancel
    setTimeout(()=>{
      const u=new SpeechSynthesisUtterance(text);
      u.lang="en-US";u.rate=0.93;u.volume=1;
      const v=speechSynthesis.getVoices();
      const pick=v.find(x=>/enhanced|premium|natural|neural/i.test(x.name)&&x.lang.startsWith("en"))
        ||v.find(x=>/samantha|karen|daniel|moira|google/i.test(x.name)&&x.lang.startsWith("en"))
        ||v.find(x=>x.lang==="en-US")
        ||v.find(x=>x.lang.startsWith("en"));
      if(pick)u.voice=pick;
      let done=false;
      const finish=()=>{if(!done){done=true;r();}};
      u.onend=finish;
      u.onerror=finish;
      // Safety timeout: if onend never fires (iOS bug), resolve after estimated duration
      const words=text.split(/\s+/).length;
      const ms=Math.max(2000,words*400);
      setTimeout(finish,ms);
      // iOS fix: re-check paused state
      speechSynthesis.speak(u);
      if(isIOS){
        // iOS sometimes pauses randomly, keep it alive
        const keepAlive=setInterval(()=>{
          if(done){clearInterval(keepAlive);return;}
          if(speechSynthesis.paused)speechSynthesis.resume();
        },300);
      }
    },100);
  });
}
function startListen(){if(!recognition){showDbg("No speech recognition");setPhase("idle");return;}lastTranscript="";rmLive();setPhase("listening");try{recognition.start();}catch(e){showDbg("Mic: "+e.message);setPhase("idle");}}
function micTap(){unlockAudio();if(phase==="listening"){setPhase("sending");rmLive();try{recognition.stop();}catch{const t=lastTranscript.trim();setPhase("idle");if(t)sendMsg(t);}}else if(phase==="speaking"){speechSynthesis?.cancel();setPhase("idle");}else if(phase==="idle"){startListen();}}

function setPhase(p){
  phase=p;const btn=document.getElementById("mic-btn"),rng=document.getElementById("rings"),pt=document.getElementById("phase-text"),ph=document.getElementById("phase-hint");
  const C={listening:"#f59e0b",speaking:"#60a5fa",thinking:"#a78bfa",sending:"#a78bfa",idle:"#34d399"};
  const T={listening:"🎙️ Recording...",speaking:"🔊 Coach speaking...",thinking:"🤔 Thinking...",sending:"⏳ Sending...",idle:"🎙️ Your turn"};
  const H={listening:"Tap STOP when done",speaking:"Tap to skip",thinking:"Waiting for Coach...",sending:"Processing...",idle:"Tap START to speak"};
  const B={listening:"⏹ Stop",speaking:"⏭ Skip",thinking:"· · ·",sending:"· · ·",idle:"▶ Start"};
  const BG={listening:"linear-gradient(135deg,#ef4444,#dc2626)",speaking:"linear-gradient(135deg,#60a5fa,#3b82f6)",thinking:"#252a3a",sending:"#252a3a",idle:"linear-gradient(135deg,#22c55e,#16a34a)"};
  pt.textContent=T[p];pt.style.color=C[p];ph.textContent=H[p];
  btn.textContent=B[p];btn.style.background=BG[p];btn.disabled=(p==="thinking"||p==="sending");
  btn.style.boxShadow=(p==="listening"||p==="idle")?"0 0 30px "+C[p]+"40":"none";
  if(p==="listening"||p==="speaking"){rng.style.display="block";rng.querySelectorAll(".ring").forEach(r=>r.style.color=C[p]);}else{rng.style.display="none";}
}

function addCoach(d){const l=document.getElementById("chat-log"),div=document.createElement("div");let h=`<div style="display:flex;gap:10px"><div style="width:32px;height:32px;border-radius:50%;background:#60a5fa18;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🎓</div><div style="padding:10px 14px;border-radius:14px;max-width:80%;background:#161923;border:1px solid #252a3a;font-size:15px;line-height:1.55">${esc(d.reply)}</div></div>`;if(d.fixes?.length>0){h+=`<div style="margin-left:42px;margin-top:5px">`;d.fixes.forEach(f=>{h+=`<div style="font-size:13px;padding:3px 0"><span style="color:#f87171;text-decoration:line-through">${esc(f.wrong)}</span><span style="color:#8b95ab"> → </span><span style="color:#34d399;font-weight:600">${esc(f.right)}</span><div style="color:#556178;font-size:11px;margin-top:1px">${esc(f.why)}</div></div>`;});h+=`</div>`;}if(d.tip)h+=`<div style="margin-left:42px;margin-top:4px;font-size:13px;color:#60a5fa">💡 ${esc(d.tip)}</div>`;div.innerHTML=h;l.appendChild(div);l.scrollTop=l.scrollHeight;}
function addUser(t){const l=document.getElementById("chat-log"),d=document.createElement("div");d.innerHTML=`<div style="display:flex;gap:10px;flex-direction:row-reverse"><div style="width:32px;height:32px;border-radius:50%;background:#f59e0b18;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🧑</div><div style="padding:10px 14px;border-radius:14px;max-width:80%;background:#f59e0b14;border:1px solid #f59e0b22;font-size:15px;line-height:1.55">${esc(t)}</div></div>`;l.appendChild(d);l.scrollTop=l.scrollHeight;}
function addEval(ev){const l=document.getElementById("chat-log"),d=document.createElement("div"),s=[["Gram",ev.grammar],["Vocab",ev.vocabulary],["Fluency",ev.fluency],["Coher",ev.coherence],["Pragma",ev.pragmatic]];d.innerHTML=`<div class="card" style="background:#a78bfa10;border:1px solid #a78bfa22"><div style="font-size:16px;font-weight:700;margin-bottom:10px">📊 Evaluation</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">${s.map(([l,s])=>`<div style="padding:5px 10px;border-radius:8px;background:#0c0e14;text-align:center"><div style="font-size:10px;color:#8b95ab">${l}</div><div style="font-size:18px;font-weight:700;color:${s>=7?"#34d399":s>=5?"#f59e0b":"#f87171"}">${s}</div></div>`).join("")}</div><div style="font-size:14px;font-weight:600;color:${LEVELS[ev.level]?.color||"#e8ecf4"}">Level: ${ev.level}</div><div style="font-size:13px;color:#8b95ab;margin-top:4px">${esc(ev.summary)}</div>${ev.strengths?.length?`<div style="font-size:12px;color:#34d399;margin-top:4px">✓ ${ev.strengths.join(" · ")}</div>`:""}${ev.improve?.length?`<div style="font-size:12px;color:#f59e0b;margin-top:2px">↑ ${ev.improve.join(" · ")}</div>`:""}</div>`;l.appendChild(d);l.scrollTop=l.scrollHeight;}
let liveEl=null;
function showLive(t){const l=document.getElementById("chat-log");if(!liveEl){liveEl=document.createElement("div");liveEl.innerHTML=`<div style="display:flex;gap:10px;flex-direction:row-reverse"><div style="width:32px;height:32px;border-radius:50%;background:#f59e0b18;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🧑</div><div id="live-t" style="padding:10px 14px;border-radius:14px;max-width:80%;background:#f59e0b0a;border:1px dashed #f59e0b30;color:#f59e0b;font-size:15px;font-style:italic"></div></div>`;l.appendChild(liveEl);}document.getElementById("live-t").textContent=t;l.scrollTop=l.scrollHeight;}
function rmLive(){if(liveEl){liveEl.remove();liveEl=null;}}
function showDbg(m){const d=document.getElementById("debug-msg");d.textContent="⚠️ "+m;d.style.display="block";}
function hideDbg(){document.getElementById("debug-msg").style.display="none";}
function esc(s){if(!s)return"";const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
