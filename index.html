<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeakUp Coach</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #0c0e14; color: #e8ecf4; min-height: 100vh; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #252a3a; border-radius: 2px; }
  @keyframes ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.8); opacity: 0; } }
  @keyframes dotBounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
  .card { background: #161923; border-radius: 14px; border: 1px solid #252a3a; padding: 16px; }
  .lbl { display: block; color: #8b95ab; font-size: 11px; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  input[type="text"] { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid #252a3a; background: #0c0e14; color: #e8ecf4; font-size: 15px; outline: none; font-family: 'DM Sans', sans-serif; }
  button { font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .view { display: none; }
  .view.active { display: flex; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #a78bfa; display: inline-block; }
  .dot:nth-child(1) { animation: dotBounce 1s ease 0s infinite; }
  .dot:nth-child(2) { animation: dotBounce 1s ease 0.2s infinite; }
  .dot:nth-child(3) { animation: dotBounce 1s ease 0.4s infinite; }
  .ring { position: absolute; border-radius: 50%; border: 2px solid currentColor; }
  .ring.a1 { animation: ring 2s ease-out 0s infinite; }
  .ring.a2 { animation: ring 2s ease-out 0.5s infinite; }
  .ring.a3 { animation: ring 2s ease-out 1s infinite; }
  .scenario-btn:hover { border-color: #f59e0b !important; background: #1e2231 !important; }
</style>
</head>
<body>

<!-- ===== SETUP ===== -->
<div id="v-setup" class="view active" style="min-height:100vh;align-items:center;justify-content:center;padding:20px">
  <div style="max-width:400px;width:100%;text-align:center">
    <div style="font-size:48px;margin-bottom:6px">🎙️</div>
    <h1 style="font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;margin-bottom:4px">SpeakUp Coach</h1>
    <p style="color:#8b95ab;margin-bottom:28px;font-size:14px">AI voice coach for English speaking practice</p>
    <div class="card" style="text-align:left">
      <label class="lbl">API Key</label>
      <input type="password" id="inp-key" placeholder="sk-ant-..." style="width:100%;padding:11px 14px;border-radius:10px;border:1px solid #252a3a;background:#0c0e14;color:#e8ecf4;font-size:14px;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:4px">
      <div style="font-size:10px;color:#556178;margin-bottom:18px">Get your key at <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:#60a5fa;text-decoration:none">console.anthropic.com</a>. Stored locally only.</div>
      <label class="lbl">Student name</label>
      <input type="text" id="inp-name" placeholder="Enter name..." style="margin-bottom:18px">
      <label class="lbl">Starting level</label>
      <div id="level-btns" style="display:flex;gap:8px;margin-bottom:20px"></div>
      <button id="btn-start" onclick="doSetup()" style="width:100%;padding:13px;border-radius:12px;border:none;font-weight:700;font-size:15px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000">Start Coaching</button>
    </div>
  </div>
</div>

<!-- ===== HOME ===== -->
<div id="v-home" class="view" style="min-height:100vh;flex-direction:column;padding:20px 16px;max-width:520px;margin:0 auto">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div>
      <h1 id="home-greet" style="font-family:'Outfit';font-size:22px;font-weight:800"></h1>
      <p style="color:#8b95ab;font-size:13px;margin-top:2px">Let's practice speaking</p>
    </div>
    <span id="home-level" style="padding:4px 12px;border-radius:12px;font-size:13px;font-weight:700"></span>
  </div>
  <div id="home-stats" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px"></div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button onclick="beginSession('free')" style="flex:1;padding:11px;border-radius:10px;border:1px solid #f59e0b30;background:#f59e0b08;color:#f59e0b;font-weight:600;font-size:13px">🗣️ Free Talk</button>
    <button onclick="beginSession('evaluation')" style="flex:1;padding:11px;border-radius:10px;border:1px solid #a78bfa30;background:#a78bfa08;color:#a78bfa;font-weight:600;font-size:13px">📊 Evaluate</button>
  </div>
  <div id="home-scenarios"></div>
  <div id="home-mistakes"></div>
  <button onclick="resetProfile()" style="margin-top:10px;width:100%;padding:9px;border-radius:10px;border:1px solid #252a3a;background:transparent;color:#556178;font-size:11px">Reset Profile</button>
  <div style="margin-top:8px;font-size:10px;color:#556178;text-align:center">API key: ****<span id="key-tail"></span> · <a href="#" onclick="changeKey();return false" style="color:#60a5fa;text-decoration:none">change</a></div>
</div>

<!-- ===== PRACTICE ===== -->
<div id="v-practice" class="view" style="height:100vh;flex-direction:column">
  <div style="padding:8px 14px;border-bottom:1px solid #252a3a;display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
    <div id="prac-title" style="font-size:13px;font-weight:600"></div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="prac-score" style="font-size:11px;color:#8b95ab"></span>
      <button onclick="endSession()" style="padding:4px 10px;border-radius:6px;border:1px solid #f8717130;background:#f8717108;color:#f87171;font-size:11px;font-weight:600">End</button>
    </div>
  </div>
  <div id="chat-log" style="flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px"></div>
  <div style="padding:12px 16px 28px;border-top:1px solid #252a3a;background:#161923;flex-shrink:0;text-align:center">
    <div id="debug-msg" style="font-size:11px;color:#f87171;margin-bottom:8px;display:none;padding:4px 10px;border-radius:6px;background:#f8717110"></div>
    <div id="phase-text" style="font-size:13px;margin-bottom:10px;font-weight:500;color:#34d399">🎙️ Your turn</div>
    <div style="position:relative;display:inline-flex;align-items:center;justify-content:center;width:120px;height:120px">
      <div id="rings" style="display:none">
        <div class="ring a1" style="position:absolute;width:110px;height:110px;top:5px;left:5px"></div>
        <div class="ring a2" style="position:absolute;width:110px;height:110px;top:5px;left:5px"></div>
        <div class="ring a3" style="position:absolute;width:110px;height:110px;top:5px;left:5px"></div>
      </div>
      <button id="mic-btn" onclick="micTap()" style="width:88px;height:88px;border-radius:50%;border:none;position:relative;z-index:2;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all 0.2s;background:linear-gradient(135deg,#22c55e,#16a34a);font-family:'DM Sans',sans-serif">▶ Start</button>
    </div>
    <div id="phase-hint" style="font-size:11px;color:#556178;margin-top:8px">Tap START to speak</div>
  </div>
</div>

<script>
// ===== STATE =====
let profile = null, sessions = [], allErrors = [], evals = [], apiKey = "";
let currentMode = null, currentScenario = null, aiHistory = [], stats = {score:0,n:0,fixes:0};
let phase = "idle"; // idle | thinking | speaking | listening | sending
let recognition = null, lastTranscript = "";
const LEVELS = {B1:{label:"Intermediate",color:"#f59e0b",eval:5},B2:{label:"Upper Intermediate",color:"#3b82f6",eval:7},C1:{label:"Advanced",color:"#8b5cf6",eval:10}};
const SCENARIOS = {
  daily:[
    {id:"cafe",title:"Ordering at a Cafe",prompt:"You're a barista at a cafe. The customer (the student) walks in. Greet them and take their order.",icon:"☕"},
    {id:"neighbor",title:"New Neighbor",prompt:"You just moved in next door. The student is your new neighbor. Introduce yourself.",icon:"🏠"},
    {id:"directions",title:"Giving Directions",prompt:"A tourist (the student) asks you for directions to the train station. Help them.",icon:"🗺️"},
    {id:"restaurant",title:"Restaurant Issue",prompt:"You're a restaurant manager. The student has a complaint. Handle it.",icon:"🍽️"},
    {id:"doctor",title:"Doctor Visit",prompt:"You're a doctor. The student describes symptoms. Ask questions and advise.",icon:"🏥"},
    {id:"phone",title:"Customer Service",prompt:"You're customer service. The student calls about broken internet. Help them.",icon:"📞"}
  ],
  professional:[
    {id:"interview",title:"Job Interview",prompt:"You're an interviewer. Ask the student about themselves and follow up.",icon:"💼"},
    {id:"meeting",title:"Team Meeting",prompt:"You're a team member in a meeting led by the student. Respond naturally.",icon:"📊"},
    {id:"negotiate",title:"Negotiation",prompt:"You're HR. The student negotiates salary. Discuss terms.",icon:"🤝"},
    {id:"feedback",title:"Giving Feedback",prompt:"You're a colleague receiving feedback from the student.",icon:"📝"},
    {id:"pitch",title:"Client Pitch",prompt:"You're a potential client. The student pitches their product. Ask tough questions.",icon:"🎯"},
    {id:"networking",title:"Networking",prompt:"You're at a networking event. Have a professional conversation with the student.",icon:"🌐"}
  ]
};

// ===== STORAGE =====
function save(k,v){ try{localStorage.setItem(k,JSON.stringify(v))}catch{} }
function load(k){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null} }

// ===== INIT =====
window.onload = function(){
  // Init speech recognition
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(SR){
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = "en-US";
    recognition.onresult = (e) => {
      let t = "";
      for(let i=0;i<e.results.length;i++) t += e.results[i][0].transcript;
      lastTranscript = t;
      showLiveTranscript(t);
    };
    recognition.onerror = (e) => { showDebug("Mic error: "+e.error); setPhase("idle"); };
    recognition.onend = () => {
      // Only process if we were actively listening and user pressed stop
      if(phase === "sending"){
        const t = lastTranscript.trim();
        setPhase("idle");
        if(t) sendUserMessage(t);
      } else {
        setPhase("idle");
      }
    };
  }
  // Load voices
  if(window.speechSynthesis){ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices(); }

  // Load data
  profile = load("sc-profile");
  sessions = load("sc-sessions") || [];
  allErrors = load("sc-errors") || [];
  evals = load("sc-evals") || [];
  apiKey = load("sc-apikey") || "";
  if(apiKey) document.getElementById("inp-key").value = apiKey;

  // Build level buttons
  const lb = document.getElementById("level-btns");
  Object.entries(LEVELS).forEach(([k,v])=>{
    const b = document.createElement("button");
    b.id = "lvl-"+k;
    b.innerHTML = `<div style="font-weight:700;font-size:16px">${k}</div><div style="font-size:10px;color:#8b95ab;margin-top:2px">${v.label}</div>`;
    b.style.cssText = `flex:1;padding:10px 6px;border-radius:10px;cursor:pointer;border:2px solid #252a3a;background:transparent;font-family:'DM Sans',sans-serif`;
    b.onclick = () => selectLevel(k);
    lb.appendChild(b);
  });
  selectLevel("B1");

  if(profile) showView("home");
  else showView("setup");
};

let selectedLevel = "B1";
function selectLevel(k){
  selectedLevel = k;
  Object.keys(LEVELS).forEach(lk=>{
    const b = document.getElementById("lvl-"+lk);
    if(lk===k){ b.style.borderColor=LEVELS[lk].color; b.style.background=LEVELS[lk].color+"15"; b.querySelector("div").style.color=LEVELS[lk].color; }
    else { b.style.borderColor="#252a3a"; b.style.background="transparent"; b.querySelector("div").style.color="#e8ecf4"; }
  });
}

// ===== VIEWS =====
function showView(id){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("v-"+id).classList.add("active");
  if(id==="home") renderHome();
}

function doSetup(){
  const n = document.getElementById("inp-name").value.trim();
  const k = document.getElementById("inp-key").value.trim();
  if(!n) return;
  if(!k){ showDebugSetup("Please enter your Anthropic API key"); return; }
  apiKey = k;
  save("sc-apikey", apiKey);
  profile = {name:n, level:selectedLevel, totalSessions:0, created:new Date().toISOString()};
  save("sc-profile", profile);
  showView("home");
}
function showDebugSetup(msg){ document.getElementById("inp-key").style.borderColor="#f87171"; }

function resetProfile(){
  profile = null; localStorage.removeItem("sc-profile");
  document.getElementById("inp-name").value = "";
  showView("setup");
}
function changeKey(){
  const k = prompt("Enter new Anthropic API key:", apiKey);
  if(k && k.trim()){ apiKey = k.trim(); save("sc-apikey", apiKey); renderHome(); }
}

// ===== HOME =====
function renderHome(){
  if(!profile) return;
  document.getElementById("home-greet").textContent = "Hey, "+profile.name+" 👋";
  const kt = document.getElementById("key-tail");
  if(kt) kt.textContent = apiKey ? apiKey.slice(-4) : "none";
  const lv = LEVELS[profile.level];
  const ls = document.getElementById("home-level");
  ls.textContent = profile.level;
  ls.style.color = lv.color;
  ls.style.background = lv.color+"15";
  ls.style.border = "1px solid "+lv.color+"30";

  const sessOfLevel = sessions.filter(s=>s.level===profile.level).length;
  const toEval = lv.eval - (sessOfLevel % lv.eval);
  const recent = sessions.slice(-5);
  const avg = recent.length > 0 ? (recent.reduce((a,s)=>a+parseFloat(s.avg||0),0)/recent.length).toFixed(1) : "-";

  document.getElementById("home-stats").innerHTML = [["📖",profile.totalSessions||0,"Sessions"],["⭐",avg,"Avg Score"],["📊",toEval,"To Eval"]].map(([ic,v,l])=>
    `<div class="card" style="padding:12px;text-align:center"><div style="font-size:16px">${ic}</div><div style="font-size:17px;font-weight:700;margin-top:2px">${v}</div><div style="font-size:10px;color:#8b95ab">${l}</div></div>`
  ).join("");

  let scenHtml = "";
  ["daily","professional"].forEach(cat=>{
    scenHtml += `<h3 style="color:#e8ecf4;font-size:13px;font-weight:700;margin:0 0 8px">${cat==="daily"?"🌤️ Daily":"💼 Professional"}</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">`;
    SCENARIOS[cat].forEach(sc=>{
      scenHtml += `<button class="card scenario-btn" onclick="beginSession('${cat}',${SCENARIOS[cat].indexOf(sc)})" style="padding:11px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px"><span style="font-size:18px">${sc.icon}</span><span style="font-size:12px;font-weight:600">${sc.title}</span></button>`;
    });
    scenHtml += `</div>`;
  });
  document.getElementById("home-scenarios").innerHTML = scenHtml;

  // Mistakes
  const topE = allErrors.reduce((a,e)=>{const k=e.why||e.right;a[k]=(a[k]||0)+1;return a},{});
  const sorted = Object.entries(topE).sort((a,b)=>b[1]-a[1]).slice(0,4);
  if(sorted.length > 0){
    document.getElementById("home-mistakes").innerHTML = `<div class="card" style="margin-bottom:12px"><h3 style="margin:0 0 8px;font-size:13px;font-weight:700">🔄 Common Mistakes</h3>${sorted.map(([e,c])=>`<div style="font-size:12px;color:#8b95ab;padding:4px 0;display:flex;justify-content:space-between"><span>${e}</span><span style="color:#f87171;font-weight:700">x${c}</span></div>`).join("")}</div>`;
  } else {
    document.getElementById("home-mistakes").innerHTML = "";
  }
}

// ===== PRACTICE =====
function beginSession(m, scIdx){
  currentMode = m;
  currentScenario = (m==="daily"||m==="professional") ? SCENARIOS[m][scIdx] : null;
  aiHistory = [];
  stats = {score:0, n:0, fixes:0};
  document.getElementById("chat-log").innerHTML = "";
  document.getElementById("prac-score").textContent = "";
  document.getElementById("debug-msg").style.display = "none";

  const title = currentScenario ? currentScenario.title : (m==="evaluation" ? "📊 Evaluation" : "🗣️ Free Talk");
  document.getElementById("prac-title").textContent = title;

  showView("practice");

  // Ask AI to start
  const sys = buildSysPrompt();
  const startMsg = m==="evaluation" ? "Begin the evaluation. Greet briefly, ask the first question."
    : currentScenario ? "Begin the role-play. Set the scene in one short sentence and say your opening line."
    : "Start a conversation with "+profile.name+". Say something interesting.";

  callCoach(sys, [{role:"user",content:startMsg}], true);
}

function buildSysPrompt(){
  const lvl = {
    B1:"Student is B1 Intermediate. Use clear English. Correct basic grammar. Keep lines to 1-2 sentences.",
    B2:"Student is B2 Upper-Intermediate. Use natural English. Correct subtle grammar, push vocabulary. 1-2 sentences.",
    C1:"Student is C1 Advanced. Use sophisticated English with idioms. Focus on nuance. 1-2 sentences."
  }[profile.level];

  const evalP = currentMode==="evaluation" ? `\nEVALUATION MODE. After 6 exchanges, include "eval_done":true and "eval":{"grammar":N,"vocabulary":N,"fluency":N,"coherence":N,"pragmatic":N,"level":"B1|B2|C1","summary":"...","strengths":["..."],"improve":["..."]}` : "";

  return `You are Coach Alex, a friendly English speaking coach for ${profile.name}.
${lvl}
${currentScenario ? "ROLE-PLAY: "+currentScenario.prompt : "Have a natural conversation. Ask engaging questions."}
${evalP}

RULES:
1. Your "reply" is spoken aloud via TTS. Keep it SHORT (1-2 sentences). No markdown or special characters.
2. Stay in character.
3. Check every student message for errors.

Respond with ONLY valid JSON, nothing else:
{"reply":"your short response","fixes":[{"wrong":"error","right":"correct","why":"explanation"}],"tip":"better way or null","score":7}

Empty fixes if none: "fixes":[]
NO code blocks. NO text outside JSON.`;
}

async function callCoach(sys, msgs, isStart){
  setPhase("thinking");
  hideDebug();
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(()=>ctrl.abort(), 25000);
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", signal:ctrl.signal,
      headers:{
        "Content-Type":"application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:sys,messages:msgs})
    });
    clearTimeout(timer);
    if(!res.ok){ const e = await res.json().catch(()=>({})); throw new Error("API "+res.status+": "+(e.error?.message||res.statusText)); }
    const data = await res.json();
    const raw = (data.content||[]).map(c=>c.text||"").join("");
    if(!raw) throw new Error("Empty response");

    let parsed;
    try { parsed = JSON.parse(raw); } catch {
      const m = raw.match(/\{[\s\S]*\}/);
      if(m) try { parsed = JSON.parse(m[0]); } catch { parsed = null; }
    }
    if(!parsed||!parsed.reply) parsed = {reply:raw.slice(0,200),fixes:[],tip:null,score:5};

    // Eval check
    if(parsed.eval_done && parsed.eval){
      addEvalMsg(parsed.eval);
      const rec = {...parsed.eval, date:new Date().toISOString(), prev:profile.level};
      evals.push(rec); save("sc-evals",evals);
      if(parsed.eval.level!==profile.level && LEVELS[parsed.eval.level]){ profile.level=parsed.eval.level; save("sc-profile",profile); }
      setPhase("speaking");
      await sayText("Your level is "+parsed.eval.level+". "+parsed.eval.summary);
      setPhase("idle");
      return;
    }

    aiHistory = [...msgs, {role:"assistant",content:JSON.stringify(parsed)}];
    addCoachMsg(parsed, isStart);

    if(!isStart && parsed.fixes?.length>0){
      parsed.fixes.forEach(f=>allErrors.push({...f,ts:Date.now(),level:profile.level}));
      allErrors = allErrors.slice(-200);
      save("sc-errors",allErrors);
    }
    if(!isStart){
      stats.score += (parsed.score||5); stats.n++; stats.fixes += (parsed.fixes?.length||0);
      document.getElementById("prac-score").textContent = (stats.score/stats.n).toFixed(1)+"/10";
    }

    // Speak the reply, then wait for user
    setPhase("speaking");
    await sayText(parsed.reply);
    setPhase("idle");

  } catch(err) {
    const msg = err.name==="AbortError" ? "Timed out (25s)" : err.message;
    showDebug(msg);
    addCoachMsg({reply:"Sorry, connection error. Tap mic to try again.",fixes:[],tip:null,score:null}, false);
    setPhase("idle");
  }
}

function sendUserMessage(text){
  addUserMsg(text);
  lastTranscript = "";
  removeLiveTranscript();
  callCoach(buildSysPrompt(), [...aiHistory, {role:"user",content:text}], false);
}

// ===== SPEECH =====
function sayText(text){
  return new Promise(resolve=>{
    if(!window.speechSynthesis){resolve();return;}
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US"; u.rate = 0.93; u.pitch = 1.0;
    const voices = speechSynthesis.getVoices();
    // Prefer high-quality / neural voices
    const pick = voices.find(v => /natural|neural|enhanced|premium/i.test(v.name) && v.lang.startsWith("en"))
      || voices.find(v => /samantha|karen|daniel|moira|fiona|google us english/i.test(v.name))
      || voices.find(v => v.lang.startsWith("en-US") && !v.localService)
      || voices.find(v => v.lang.startsWith("en"));
    if(pick) u.voice = pick;
    u.onend = resolve; u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}

function startListening(){
  if(!recognition){setPhase("idle");return;}
  lastTranscript = "";
  removeLiveTranscript();
  setPhase("listening");
  try{recognition.start();}catch{setPhase("idle");}
}

function micTap(){
  if(phase==="listening"){
    // STOP: user is done speaking, send the message
    setPhase("sending");
    removeLiveTranscript();
    try{recognition.stop();}catch{
      // If stop fails, manually send
      const t = lastTranscript.trim();
      setPhase("idle");
      if(t) sendUserMessage(t);
    }
  } else if(phase==="speaking"){
    // Skip/interrupt coach speaking
    speechSynthesis?.cancel();
    setPhase("idle");
  } else if(phase==="idle"){
    // START: begin listening
    startListening();
  }
}

function endSession(){
  speechSynthesis?.cancel();
  try{recognition?.stop();}catch{}
  setPhase("idle");
  const s = {id:Date.now(),date:new Date().toISOString(),mode:currentMode,scenario:currentScenario?.title||"Free Talk",level:profile.level,avg:stats.n>0?(stats.score/stats.n).toFixed(1):0,msgs:stats.n,fixes:stats.fixes};
  sessions.push(s); sessions=sessions.slice(-100); save("sc-sessions",sessions);
  profile.totalSessions = (profile.totalSessions||0)+1; save("sc-profile",profile);
  showView("home");
}

// ===== UI HELPERS =====
function setPhase(p){
  phase = p;
  const btn = document.getElementById("mic-btn");
  const rings = document.getElementById("rings");
  const pt = document.getElementById("phase-text");
  const ph = document.getElementById("phase-hint");
  const colors = {listening:"#f59e0b",speaking:"#60a5fa",thinking:"#a78bfa",sending:"#a78bfa",idle:"#34d399"};
  const emojis = {listening:"🎙️",speaking:"🔊",thinking:"🤔",sending:"⏳",idle:"🎙️"};
  const texts = {listening:"Recording...",speaking:"Coach is speaking...",thinking:"Thinking...",sending:"Sending...",idle:"Your turn"};
  const hints = {listening:"Tap STOP when you're done speaking",speaking:"Tap to skip",thinking:"Waiting for Coach Alex...",sending:"Processing your speech...",idle:"Tap START to speak"};
  const btnContent = {listening:"⏹ Stop",speaking:"⏭️",thinking:"...",sending:"...",idle:"▶ Start"};
  const btnBg = {listening:"linear-gradient(135deg,#ef4444,#dc2626)",speaking:"linear-gradient(135deg,#60a5fa,#3b82f6)",thinking:"#252a3a",sending:"#252a3a",idle:"linear-gradient(135deg,#22c55e,#16a34a)"};

  pt.textContent = emojis[p]+" "+texts[p]; pt.style.color = colors[p];
  ph.textContent = hints[p];
  btn.innerHTML = btnContent[p]; btn.style.background = btnBg[p];
  btn.disabled = (p==="thinking"||p==="sending");
  btn.style.boxShadow = (p==="listening"||p==="idle") ? "0 0 25px "+colors[p]+"40" : "none";
  btn.style.fontSize = (p==="listening"||p==="idle") ? "14px" : "20px";
  btn.style.fontWeight = "700";
  btn.style.fontFamily = "'DM Sans', sans-serif";

  if(p==="listening"||p==="speaking"){
    rings.style.display="block";
    rings.querySelectorAll(".ring").forEach(r=>r.style.color=colors[p]);
  } else {
    rings.style.display="none";
  }
}

function addCoachMsg(parsed){
  const log = document.getElementById("chat-log");
  const div = document.createElement("div");
  let html = `<div style="display:flex;gap:8px"><div style="width:28px;height:28px;border-radius:50%;background:#60a5fa18;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">🎓</div><div style="padding:9px 13px;border-radius:12px;max-width:80%;background:#161923;border:1px solid #252a3a;font-size:14px;line-height:1.5">${esc(parsed.reply)}</div></div>`;
  if(parsed.fixes?.length>0){
    html += `<div style="margin-left:36px;margin-top:4px">`;
    parsed.fixes.forEach(f=>{
      html += `<div style="font-size:12px;padding:3px 0"><span style="color:#f87171;text-decoration:line-through">${esc(f.wrong)}</span><span style="color:#8b95ab"> → </span><span style="color:#34d399;font-weight:600">${esc(f.right)}</span><span style="color:#556178;margin-left:6px;font-size:11px">${esc(f.why)}</span></div>`;
    });
    html += `</div>`;
  }
  if(parsed.tip) html += `<div style="margin-left:36px;margin-top:3px;font-size:12px;color:#60a5fa">💡 ${esc(parsed.tip)}</div>`;
  div.innerHTML = html;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function addUserMsg(text){
  const log = document.getElementById("chat-log");
  const div = document.createElement("div");
  div.innerHTML = `<div style="display:flex;gap:8px;flex-direction:row-reverse"><div style="width:28px;height:28px;border-radius:50%;background:#f59e0b18;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">🧑</div><div style="padding:9px 13px;border-radius:12px;max-width:80%;background:#f59e0b14;border:1px solid #f59e0b22;font-size:14px;line-height:1.5">${esc(text)}</div></div>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function addEvalMsg(ev){
  const log = document.getElementById("chat-log");
  const div = document.createElement("div");
  const scores = [["Gram",ev.grammar],["Vocab",ev.vocabulary],["Fluency",ev.fluency],["Coher",ev.coherence],["Pragma",ev.pragmatic]];
  div.innerHTML = `<div class="card" style="background:#a78bfa10;border:1px solid #a78bfa22"><div style="font-size:15px;font-weight:700;margin-bottom:10px">📊 Evaluation</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">${scores.map(([l,s])=>`<div style="padding:4px 10px;border-radius:8px;background:#0c0e14;text-align:center"><div style="font-size:9px;color:#8b95ab">${l}</div><div style="font-size:16px;font-weight:700;color:${s>=7?"#34d399":s>=5?"#f59e0b":"#f87171"}">${s}</div></div>`).join("")}</div><div style="font-size:13px;font-weight:600;color:${LEVELS[ev.level]?.color||"#e8ecf4"}">Level: ${ev.level}</div><div style="font-size:12px;color:#8b95ab;margin-top:4px">${esc(ev.summary)}</div>${ev.strengths?.length?`<div style="font-size:11px;color:#34d399;margin-top:4px">✓ ${ev.strengths.join(" · ")}</div>`:``}${ev.improve?.length?`<div style="font-size:11px;color:#f59e0b;margin-top:2px">↑ ${ev.improve.join(" · ")}</div>`:``}</div>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

let liveEl = null;
function showLiveTranscript(text){
  const log = document.getElementById("chat-log");
  if(!liveEl){
    liveEl = document.createElement("div");
    liveEl.innerHTML = `<div style="display:flex;gap:8px;flex-direction:row-reverse"><div style="width:28px;height:28px;border-radius:50%;background:#f59e0b18;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">🧑</div><div id="live-text" style="padding:9px 13px;border-radius:12px;max-width:80%;background:#f59e0b0a;border:1px dashed #f59e0b30;color:#f59e0b;font-size:14px;font-style:italic"></div></div>`;
    log.appendChild(liveEl);
  }
  document.getElementById("live-text").textContent = text;
  log.scrollTop = log.scrollHeight;
}
function removeLiveTranscript(){ if(liveEl){liveEl.remove();liveEl=null;} }

function showDebug(msg){ const d=document.getElementById("debug-msg"); d.textContent="⚠️ "+msg; d.style.display="block"; }
function hideDebug(){ document.getElementById("debug-msg").style.display="none"; }

function esc(s){ if(!s)return""; const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
</script>
